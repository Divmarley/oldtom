version: '3.9'

services:
  backend:
    build: ./backend
    container_name: oldtom_backend
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    expose:
      - "80"
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn core.wsgi:application --bind 0.0.0.0:8000
      "

  frontend:
    build: ./frontend
    container_name: oldtom_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    expose:
      - "5173"
    command: npm run dev -- --host
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - backend
      - frontend

volumes:
  static_volume:
  media_volume: